version: '3.8'
services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    volumes:
      - /volume1:/mnt/nas
      - maxwells-demon-data:/app/data
    environment:
      - DOCKER_MODE=true
      - NAS_ROOT=/mnt/nas
      - DB_PATH=/app/data/maxwells_demon.db
      - WORKERS=2
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["3080:80"]
    depends_on: [backend]
    environment:
      - VITE_API_URL=http://backend:8000
    restart: unless-stopped

volumes:
  maxwells-demon-data:
